spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8083

# RABBITMQ
spring.rabbitmq.host=${RABBITMQ_HOST:message-broker}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:admin}
spring.rabbitmq.password=${RABBITMQ_PASS:admin}

spring.rabbitmq.listener.simple.default-requeue-rejected=false

# RESILIENCE4J CONFIG
resilience4j.retry.instances.perfilRetry.max-attempts=3
resilience4j.retry.instances.perfilRetry.wait-duration=2s
resilience4j.retry.instances.perfilRetry.retry-exceptions=org.springframework.web.client.ResourceAccessException,java.io.IOException

resilience4j.circuitbreaker.instances.perfilCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.perfilCB.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.perfilCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.perfilCB.wait-duration-in-open-state=10s

# EUREKA CONFIG
eureka.client.service-url.default-zone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true
