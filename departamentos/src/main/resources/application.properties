spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8081

# RESILIENCE4J CONFIG
resilience4j.retry.instances.departamentoRetry.max-attempts=3
resilience4j.retry.instances.departamentoRetry.wait-duration=2s
resilience4j.retry.instances.departamentoRetry.retry-exceptions=org.springframework.web.client.ResourceAccessException,java.io.IOException

resilience4j.circuitbreaker.instances.departamentoCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.departamentoCB.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.departamentoCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.departamentoCB.wait-duration-in-open-state=10s

# EUREKA CONFIG
eureka.client.service-url.default-zone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true
